<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rejestracja student</title>

    <link rel="stylesheet" href="../../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oswald:wght@200..700&display=swap"
        rel="stylesheet">
</head>

<body class="strona-rejestracja">
    <div class="zarejestruj">
        <img src="../../img/korki.png" alt="Student" class="logo-ksiazka">
        <h2>Dołącz do nas</h2>

        <div class="input-group">
            <label for="Email">E-mail</label>
            <input type="email" required id="Email" placeholder="przyklad@poczta.pl">
        </div>

        <div class="input-group">
            <label for="Login">Login</label>
            <input type="text" id="Login" placeholder="Wybierz login">
        </div>

        <div class="input-group">
            <label for="PhoneNumber">Numer telefonu (opcjonalnie)</label>
            <input type="number" id="PhoneNumber" placeholder="123456789">
        </div>

        <div class="input-group">
            <label for="Password">Hasło</label>
            <input type="password" id="Password" placeholder="••••••••">
        </div>

        <div class="input-group">
            <label for="ConfirmPassword">Powtórz hasło</label>
            <input type="password" id="ConfirmPassword" placeholder="••••••••">
        </div>

        <button id="enter-rejestracja" class="btn-primary">Zarejestruj się</button>

        <p class="form-footer">
            Masz już konto? <a href="zaloguj.html">Zaloguj się</a>
        </p>
    </div>
</body>
<script src="../../js/register.js"></script>

</html>
