<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Logowanie student</title>

    <link rel="stylesheet" href="../../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oswald:wght@200..700&display=swap"
        rel="stylesheet">
</head>

<body class="strona-logowanie">
    <div class="formularz-logowanie">
        <img src="../../img/korki.png" alt="Student" class="logo-ksiazka">
        <h2>Zaloguj się</h2>

        <div class="input-group">
            <label for="Login">Login</label>
            <input type="text" id="Login" required placeholder="Wpisz swój login">
        </div>

        <div class="input-group">
            <label for="Password">Hasło</label>
            <input type="password" id="Password" required placeholder="••••••••">
        </div>

        <button id="enter-logowanie" class="btn-primary">Zaloguj się</button>

        <p class="form-footer">
            Nie masz konta? <a href="zarejestruj.html">Zarejestruj się</a>
        </p>

        <a href="index-standard.html" class="back-link">Powrót do strony głównej</a>
    </div>
</body>
<script src="../../js/login.js"></script>

</html>
