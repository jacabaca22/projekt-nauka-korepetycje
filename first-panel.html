<!DOCTYPE html>
<html lang="en">

<head>

    <title>Wybierz swoje korepetycje</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body class="strona-wyboru">

            <a href="zaloguj.html" class="selection-card tutor-card">
                <div class="card-icon">👨‍🏫</div>
                <h2>Korepetytor</h2>
                <p>Chcę dzielić się wiedzą i pomagać innym w nauce.</p>

        </div>
    </div>
    <script src="js/panel.js"></script>
