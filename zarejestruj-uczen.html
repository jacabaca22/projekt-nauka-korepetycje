<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja uczen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oswald:wght@200..700&display=swap"
        rel="stylesheet">
</head>

<body class=strona-rejestracja>
    <div class=zarejestruj>
        <img src="student.jpg" height=50px width=50px>
        <h2>Zarejestruj się (Uczeń)</h2>
        <h3>E-mail: </h3>
        <input type="email" required id="Email">
        <h3>Login:</h3>
        <input type="text" id="Login">
        <h3>Hasło</h3>
        <input type="password" id="Password">
        <h3>Powtórz hasło:</h3>
        <input type="password" id="ConfirmPassword">
        <a id="enter-rejestracja">Enter</a>
        <h3>Masz już konto?</h3>
        <a href="zaloguj-uczen.html" id="enter-logowanie">Zaloguj się</a>
    </div>
</body>
<script src="register.js"></script>

</html>
